name: NSE daily pipeline

on:
  schedule:
    # 13:05 UTC = 16:05 Nairobi (UTC+3), weekdays only.
    # GitHub Actions cron is UTC-only and best-effort (can be delayed
    # several minutes under load, or occasionally skipped) - don't rely
    # on this for anything requiring second-level precision.
    - cron: "5 13 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_SSLMODE: require   # Render's external Postgres URL requires TLS

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Scrape NSE
        working-directory: backend
        run: python etl/scrape_nse.py

      - name: Load into Postgres
        working-directory: backend
        run: python etl/load_postgres.py

      - name: Export static JSON snapshot
        working-directory: backend
        run: python etl/build_static_export.py

      - name: Export Power BI CSVs
        working-directory: backend
        run: python etl/export_powerbi.py

      # The two export steps above write files inside the checked-out repo
      # (backend/app/static_data/*.json, powerbi/exports/*.csv), but that
      # copy only exists on this disposable runner - it's gone the moment
      # the job ends. Commit them back so the fallback JSON and CSVs stay
      # current in the repo itself. Skip this step if you don't need the
      # static fallback to track daily runs (e.g. your FastAPI deployment
      # always has live Postgres access).
      - name: Commit updated exports
        run: |
          git config user.name "nse-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/app/static_data powerbi/exports
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Automated NSE data update $(date -u +%Y-%m-%d)"
          git push