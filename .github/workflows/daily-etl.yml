name: NSE Daily ETL

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Prefer IPv4 (workaround for GitHub Actions IPv6 routing issue)
        run: echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf

      - name: Scrape latest NSE data
        working-directory: backend
        run: python etl/scrape_nse.py

      - name: Load into Postgres
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/load_postgres.py

      - name: Run data quality checks
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/data_quality_checks.py

      - name: Rebuild static JSON fallback
        working-directory: backend
        run: python etl/build_static_export.py

      - name: Commit refreshed static data
        run: |
          git config user.name "nse-etl-bot"
          git config user.email "actions@github.com"
          git add backend/app/static_data/ data/scraped/
          git diff --staged --quiet || git commit -m "Daily NSE data refresh $(date +%F)"
          git push