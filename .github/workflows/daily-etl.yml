name: NSE Daily ETL

on:
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Prefer IPv4 (workaround for GitHub Actions IPv6 routing issue)
        run: echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf

      - name: Debug connectivity
        run: |
          echo "--- Can we reach the internet at all? ---"
          curl -sS -o /dev/null -w "%{http_code}\n" --max-time 10 https://www.google.com || echo "FAILED"
          echo "--- Can we reach the target site? ---"
          curl -sS -o /dev/null -w "%{http_code}\n" --max-time 10 https://afx.kwayisi.org/nse/ || echo "FAILED"
          echo "--- With a browser-like User-Agent? ---"
          curl -sS -o /dev/null -w "%{http_code}\n" --max-time 10 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" https://afx.kwayisi.org/nse/ || echo "FAILED"

      - name: Scrape latest NSE data
        working-directory: backend
        run: python etl/scrape_nse.py

      - name: Load into Postgres
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/load_postgres.py

      - name: Run data quality checks
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/data_quality_checks.py

      - name: Rebuild static JSON fallback
        working-directory: backend
        run: python etl/build_static_export.py

      - name: Commit refreshed static data
        run: |
          git config user.name "nse-etl-bot"
          git config user.email "actions@github.com"
          git add backend/app/static_data/ data/scraped/
          git diff --staged --quiet || git commit -m "Daily NSE data refresh $(date +%F)"
          git push