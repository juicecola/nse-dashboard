version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.2-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    POSTGRES_USER: nse_dashboard
    POSTGRES_PASSWORD: nse_dashboard
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: nse_dashboard
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas==2.2.2 sqlalchemy==2.0.35 psycopg2-binary==2.9.9 requests==2.32.3 lxml==5.3.0 beautifulsoup4==4.12.3"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./:/opt/airflow/project
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nse_dashboard
      POSTGRES_PASSWORD: nse_dashboard
      POSTGRES_MULTIPLE_DATABASES: "nse_dashboard,airflow"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nse_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  backend:
    build: ./backend
    env_file:
      - backend/.env         
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data

  # OPTIONAL cron-based scheduler - an ALTERNATIVE to Airflow, not additive.
  # Don't run this at the same time as an unpaused Airflow DAG, or you'll
  # scrape/load twice a day. Disabled by default (behind the "cron" profile);
  # start it explicitly with: docker-compose --profile cron up -d
  # See infra/cron/ and the "Scheduling" section of README.md for when to
  # prefer this over Airflow.
  cron:
    build:
      context: .
      dockerfile: infra/cron/Dockerfile.cron
    profiles: ["cron"]
    environment:
      POSTGRES_USER: nse_dashboard
      POSTGRES_PASSWORD: nse_dashboard
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: nse_dashboard
    depends_on:
      - postgres
    volumes:
      - ./data:/data

volumes:
  pg_data:
